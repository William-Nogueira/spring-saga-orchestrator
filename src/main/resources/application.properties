spring.application.name=spring-saga-orchestrator

saga.step-timeout=${SAGA_STEP_TIMEOUT:PT120S}
saga.step-max-attempts=${SAGA_STEP_MAX_ATTEMPTS:3}
saga.sweep-interval=${SAGA_SWEEP_INTERVAL:PT300S}

# Concurrency
spring.threads.virtual.enabled=true

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/saga}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:saga}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:saga}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:saga}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:saga}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %5p [%15.15t] [%X{sagaId:-}] %-40.40logger{39} : %m%n
