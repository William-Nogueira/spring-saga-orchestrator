spring.application.name=spring-saga-orchestrator

# Concurrency
spring.threads.virtual.enabled=true

# Postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/saga}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:saga}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:saga}

# JPA — schema is owned by Flyway; validate that entities and migrations agree
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:saga}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:saga}
